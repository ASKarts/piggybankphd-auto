name: piggbankphd automation

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

- name: Generate script
        run: |
          cat << 'EOF' > script.txt
          Top 3 ways students can save money today:
          1. Buy used textbooks
          2. Share subscriptions
          3. Cook instead of takeout
          EOF

      - name: Show script
        run: cat script.txt
