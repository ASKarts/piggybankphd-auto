name: piggbankphd automation

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate script
        run: |
          echo "Top 3 ways students can save money today:" > script.txt
          echo "1. Buy used textbooks" >> script.txt
          echo "2. Share subscriptions" >> script.txt
          echo "3. Cook instead of takeout" >> script.txt

      - name: Show script
        run: cat script.txt
